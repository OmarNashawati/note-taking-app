<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/style.css" />
    <title>Note Taking app</title>
  </head>

  <body>
    <aside class="sidebar">
      <div class="logo">
        <img src="./images/logo.svg" alt="" />
      </div>

      <div class="notes-button-container">
        <div class="aside-button active js-all-notes-button">
          <i class="icon home-icon"></i>
          <i>All Notes</i>
          <i class="icon arrow-icon"></i>
        </div>

        <div class="aside-button js-archived-notes-button">
          <i class="icon archive-icon"></i>
          <i>Archived Notes</i>
          <i class="icon arrow-icon"></i>
        </div>
      </div>
    </aside>

    <main>
      <header>
        <h1 class="header-title">All Notes</h1>

        <div class="header-actions-container">
          <div class="search-container">
            <i class="icon search-icon"></i>
            <input
              type="text"
              placeholder="Search by target, content or tags ..."
            />
          </div>

          <div class="dropdown-settings-container">
            <div class="header-button js-settings-toggle">
              <i class="icon settigs-icon icon--md"></i>
            </div>

            <div class="dropdown-settings js-settings-dropdown">
              <div class="dropdown-button">
                <i class="icon sun-icon"></i>
                Color Theme
                <i class="icon arrow-icon"></i>
              </div>
              <div class="dropdown-button">
                <i class="icon font-icon"></i>
                Color Theme
                <i class="icon arrow-icon"></i>
              </div>
              <div class="dropdown-button">
                <i class="icon lock-icon"></i>
                Change Password
                <i class="icon arrow-icon"></i>
              </div>

              <i class="line-seperator"></i>

              <div class="dropdown-button">
                <i class="icon logout-icon"></i>
                Logout
                <i class="icon arrow-icon"></i>
              </div>
            </div>
          </div>
        </div>
      </header>

      <div class="main-container">
        <div class="nots-list-container">
          <div class="create-note-button js-create-note-button">
            <i class="icon add-icon"></i>
            Create New Note
          </div>

          <div class="no-notes-message js-no-notes-message">
            <p>
              You don't have any notes yet. Start a new note to capture your
              thoughts and ideas.
            </p>
          </div>

          <div class="notes js-notes-list">
            <!-- SCRIPT -->
          </div>
        </div>

        <div class="note-container js-note-container">
          <!-- Script -->
        </div>
      </div>
    </main>

    <script type="module" src="./scripts/index.js"></script>
  </body>
</html>
